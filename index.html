<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - U4</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="contenedor">

        <header class="form-header">
        <h1>Registro de Usuario</h1>
        </header>

        <form id="form-registro" novalidate>

        <!-- Nombre -->
            <section class="campo-grupo">
                <label for="nombre">Nombre completo</label>
                <input 
                id="nombre" 
                type="text" 
                name="nombre"
                required minlength="3" 
                maxlength="60"
                placeholder="Ej: Ana García"
                autocomplete="name">

                <span class="msg-error" id="error-nombre"></span>
            </section>

        <!-- Email -->    
            <section class="campo-grupo">
                <label for="email">Correo electrónico</label>
                <input
                id="email" 
                type="email" 
                name="email"
                required placeholder="usuario@dominio.com"
                autocomplete="email">

                <span class="msg-error" id="error-email"></span>
            </section>

        <!-- Password -->    
            <section class="campo-grupo">
                <label for="password">Contraseña</label>
                <input 
                id="password" 
                type="password" 
                name="password"
                required minlength="8" 
                placeholder="Mínimo 8 caracteres"
                autocomplete="new-password">

                <span class="msg-error" id="error-password"></span>
            </section>

        <!-- Confirmar password -->    
            <section class="campo-grupo">
                <label for="confirmar">Confirmar contraseña</label>
                <input 
                id="confirmar" 
                type="password" 
                name="confirmar"
                required placeholder="Repita la contraseña"
                autocomplete="new-password">

                <span class="msg-error" id="error-confirmar"></span>
            </section>

        <!-- Teléfono-->    
            <section class="campo-grupo">
                <label for="telefono">Teléfono (opcional)</label>
                <input 
                id="telefono" 
                type="tel" 
                name="telefono"
                pattern="[0-9]{7,15}"
                placeholder="Solo dígitos, 7-15 caracteres"
                autocomplete="tel">

                <span class="msg-error" id="error-telefono"></span>
            </section>

        <!-- Botón --> 
            <div class="form-acciones">
            <button type="submit" id="btn-registrar">
                Registrarse
            </button>
            </div>   

        <!-- Mensaje éxito -->    
            <div id="mensaje-exito" class="oculto">
                Registro exitoso. Bienvenido al sistema.
            </div>

        </form>
    </main>
    
    <script src="validacion.js" defer></script>
</body>
</html>
